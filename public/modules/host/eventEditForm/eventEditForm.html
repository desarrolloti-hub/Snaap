<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Evento - SNAAP Host</title>
    <link rel="stylesheet" href="/src/css/components/eventEditForm.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <div class="edit-page">
            <div class="edit-container">
                <div class="edit-header">
                    <button type="button" class="btn-back" id="btnVolver">
                        <i class="fas fa-arrow-left"></i> Volver
                    </button>
                    <h1><i class="fas fa-edit"></i> Editar Evento</h1>
                </div>

                <div class="edit-content">
                    <form id="eventoEditForm">
                        <input type="hidden" id="eventoId">
                        
                        <!-- Imagen Actual -->
                        <div class="form-group">
                            <label><i class="fas fa-image"></i> Imagen Actual</label>
                            <div class="image-preview">
                                <img id="currentImage" src="" alt="Imagen del evento">
                            </div>
                        </div>
                        
                        <!-- Nombre del Evento (EDITABLE) -->
                        <div class="form-group">
                            <label for="title"><i class="fas fa-tag"></i> Nombre del Evento *</label>
                            <input type="text" id="title" required placeholder="Ej: Los XV de Rusi">
                        </div>
                        
                        <!-- Fecha (Solo lectura) -->
                        <div class="form-group">
                            <label for="date"><i class="fas fa-calendar-day"></i> Fecha del Evento</label>
                            <input type="text" id="date" readonly disabled class="readonly-field">
                        </div>
                        
                        <!-- Asistentes (Solo lectura) -->
                        <div class="form-group">
                            <label for="attendees"><i class="fas fa-users"></i> Cantidad de Asistentes</label>
                            <input type="text" id="attendees" readonly disabled class="readonly-field">
                        </div>
                        
                        <!-- Fotos Subidas (Solo lectura) -->
                        <div class="form-group">
                            <label for="uploadedPhotos"><i class="fas fa-camera"></i> Fotos Subidas</label>
                            <input type="text" id="uploadedPhotos" readonly disabled class="readonly-field">
                        </div>
                        
                        <!-- Código de Acceso (Solo lectura) -->
                        <div class="form-group">
                            <label for="codigoAcceso"><i class="fas fa-key"></i> Código de Acceso</label>
                            <input type="text" id="codigoAcceso" readonly disabled class="readonly-field">
                        </div>
                        
                        <!-- Cambiar Imagen -->
                        <div class="form-group">
                            <label for="eventImage"><i class="fas fa-cloud-upload-alt"></i> Cambiar Imagen del Evento</label>
                            <input type="file" id="eventImage" accept="image/jpeg, image/png, image/jpg, image/webp">
                            <small class="form-hint">Formatos permitidos: JPG, PNG, WEBP. Tamaño máximo: 5MB</small>
                        </div>
                        
                        <!-- Vista previa de la nueva imagen -->
                        <div class="form-group" id="newImagePreviewGroup" style="display: none;">
                            <label><i class="fas fa-eye"></i> Vista Previa Nueva Imagen</label>
                            <div class="image-preview">
                                <img id="newImagePreview" src="" alt="Vista previa">
                            </div>
                        </div>
                        
                        <div class="form-buttons">
                            <button type="submit" class="btn-save">
                                <i class="fas fa-save"></i> Guardar Cambios
                            </button>
                            <button type="button" id="cancelarBtn" class="btn-cancel">
                                <i class="fas fa-times"></i> Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/modules/host/eventEditForm/eventEditFormController.js"></script>
</body>
</html>
