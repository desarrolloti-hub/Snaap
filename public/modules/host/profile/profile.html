<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - SNAAP Host</title>
    <link rel="stylesheet" href="/src/css/components/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <div class="profile-page">
            <div class="profile-container">
                <div class="profile-header">
                    <button type="button" class="btn-back" id="btnVolver">
                        <i class="fas fa-arrow-left"></i> Volver
                    </button>
                    <h1><i class="fas fa-user-circle"></i> Mi Perfil</h1>
                    <button type="button" class="btn-edit-profile" id="btnEditarPerfil">
                        <i class="fas fa-pen"></i> Editar Perfil
                    </button>
                </div>

                <div class="profile-content">
                    <div class="profile-avatar-section">
                        <div class="avatar-container">
                            <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?background=4db8ff&color=fff&size=120&bold=true&name=Usuario" alt="Avatar">
                        </div>
                        <h2 id="profileName">Nombre del Host</h2>
                        <p class="profile-role"><i class="fas fa-certificate"></i> Host Verificado</p>
                    </div>

                    <div class="profile-info-view">
                        <div class="info-section">
                            <div class="section-header">
                                <i class="fas fa-user"></i>
                                <h3>Información Personal</h3>
                            </div>
                            
                            <div class="info-row">
                                <div class="info-group">
                                    <label><i class="fas fa-user"></i> Nombre Completo</label>
                                    <p id="viewFullName">-</p>
                                </div>
                                <div class="info-group">
                                    <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                                    <p id="viewEmail">-</p>
                                </div>
                            </div>

                            <div class="info-row">
                                <div class="info-group">
                                    <label><i class="fas fa-phone"></i> Teléfono</label>
                                    <p id="viewPhone">-</p>
                                </div>
                                <div class="info-group">
                                    <label><i class="fas fa-building"></i> Empresa / Organización</label>
                                    <p id="viewCompany">-</p>
                                </div>
                            </div>
                        </div>

                        <div class="info-section">
                            <div class="section-header">
                                <i class="fas fa-chart-line"></i>
                                <h3>Información de Negocio</h3>
                            </div>

                            <div class="info-group">
                                <label><i class="fas fa-align-left"></i> Biografía / Descripción</label>
                                <p id="viewBio">-</p>
                            </div>

                            <div class="info-row">
                                <div class="info-group">
                                    <label><i class="fas fa-globe"></i> Sitio Web</label>
                                    <p id="viewWebsite">-</p>
                                </div>
                                <div class="info-group">
                                    <label><i class="fas fa-star"></i> Especialidad</label>
                                    <p id="viewSpecialty">-</p>
                                </div>
                            </div>

                            <div class="info-row">
                                <div class="info-group">
                                    <label><i class="fas fa-calendar-alt"></i> Años de Experiencia</label>
                                    <p id="viewExperience">-</p>
                                </div>
                                <div class="info-group">
                                    <label><i class="fas fa-check-circle"></i> Eventos Completados</label>
                                    <p id="viewEventsCompleted">-</p>
                                </div>
                            </div>
                        </div>

                        <div class="info-section readonly-section">
                            <div class="section-header">
                                <i class="fas fa-chart-simple"></i>
                                <h3>Estadísticas de la Cuenta</h3>
                            </div>

                            <div class="stats-grid">
                                <div class="stat-card">
                                    <i class="fas fa-calendar-check"></i>
                                    <div class="stat-info">
                                        <span class="stat-label">Eventos Creados</span>
                                        <span class="stat-value" id="totalEvents">0</span>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-users"></i>
                                    <div class="stat-info">
                                        <span class="stat-label">Total Invitados</span>
                                        <span class="stat-value" id="totalGuests">0</span>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-camera"></i>
                                    <div class="stat-info">
                                        <span class="stat-label">Fotos Subidas</span>
                                        <span class="stat-value" id="totalPhotos">0</span>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-heart"></i>
                                    <div class="stat-info">
                                        <span class="stat-label">Miembro Desde</span>
                                        <span class="stat-value" id="memberSince">-</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="danger-section">
                        <div class="danger-header">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Zona de Peligro</h3>
                        </div>
                        <p>Una vez que elimines tu cuenta, no podrás recuperar tus datos.</p>
                        <button type="button" class="btn-danger" id="deleteAccountBtn">
                            <i class="fas fa-trash-alt"></i> Eliminar Cuenta
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/modules/host/profile/profileController.js"></script>
</body>
</html>
