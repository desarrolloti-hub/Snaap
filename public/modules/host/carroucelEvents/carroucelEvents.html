<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Pasados - SNAAP Host</title>
    <link rel="stylesheet" href="/src/css/components/carroucelEvents.css">
    <link rel="stylesheet" href="/src/css/components/navbarHost.css">
</head>
<body>
    <div id="carroucel-container">
        <section class="snaap-carousel-section">
            <div class="carousel-title">
                <h2><i class="fas fa-calendar-alt"></i> Eventos Realizados</h2>
                <p>Descubre los eventos más memorables que hemos snapeado.</p>
            </div>
            <div class="carousel-track" id="snaap-carousel-track">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=600&auto=format&fit=crop" alt="Los XV de Rusi">
                    <h3>Los XV de Rusi</h3>
                    <div class="event-stats">
                        <div class="stat-item">
                            <i class="fas fa-users"></i>
                            <span>120 asistentes</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-camera"></i>
                            <span>45 fotos</span>
                        </div>
                    </div>
                    <div class="event-date">
                        <i class="fas fa-calendar-day"></i>
                        <span>15 Marzo 2024</span>
                    </div>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=600&auto=format&fit=crop" alt="Boda Legendaria">
                    <h3>Boda Legendaria</h3>
                    <div class="event-stats">
                        <div class="stat-item">
                            <i class="fas fa-users"></i>
                            <span>250 asistentes</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-camera"></i>
                            <span>128 fotos</span>
                        </div>
                    </div>
                    <div class="event-date">
                        <i class="fas fa-calendar-day"></i>
                        <span>22 Febrero 2024</span>
                    </div>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=600&auto=format&fit=crop" alt="Fiesta Locura Total">
                    <h3>Fiesta Locura Total</h3>
                    <div class="event-stats">
                        <div class="stat-item">
                            <i class="fas fa-users"></i>
                            <span>180 asistentes</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-camera"></i>
                            <span>92 fotos</span>
                        </div>
                    </div>
                    <div class="event-date">
                        <i class="fas fa-calendar-day"></i>
                        <span>10 Enero 2024</span>
                    </div>
                </div>
            </div>
            <button class="nav-button btn-prev" id="snaap-prev-btn">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="nav-button btn-next" id="snaap-next-btn">
                <i class="fas fa-chevron-right"></i>
            </button>
        </section>
    </div>

    <script type="module">
        import { carroucelEventsController } from '/src/modules/host/carroucelEvents/carroucelEventsController.js';
        carroucelEventsController();
    </script>
</body>
</html>
