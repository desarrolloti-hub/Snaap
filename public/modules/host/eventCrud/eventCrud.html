<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Eventos - SNAAP Host</title>
    <link rel="stylesheet" href="/src/css/components/eventCrud.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <div class="crud-page">
            <div class="crud-container">
                <div class="crud-header">
                    <h1><i class="fas fa-calendar-alt"></i>Eventos</h1>
                </div>

                <div class="crud-content">
                    <!-- Botón para crear nuevo evento -->
                    <div class="create-section">
                        <button id="btnCrearEvento" class="btn-create">
                            <i class="fas fa-plus-circle"></i> Crear Nuevo Evento
                        </button>
                    </div>

                    <!-- Lista de eventos -->
                    <div class="list-section">
                        <h2><i class="fas fa-list"></i> Lista de Eventos</h2>
                        <div class="search-bar">
                            <input type="text" id="searchInput" placeholder="Buscar evento...">
                            <i class="fas fa-search"></i>
                        </div>
                        <div id="eventosList" class="eventos-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de confirmación para eliminar -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-exclamation-triangle"></i> Confirmar Eliminación</h3>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <p>¿Estás seguro de que deseas eliminar el evento <strong id="deleteEventTitle"></strong>?</p>
                <p>Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button id="confirmDeleteBtn" class="btn-confirm-delete">Eliminar</button>
                <button id="cancelDeleteBtn" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/modules/host/eventCrud/eventCrudController.js"></script>
</body>
</html>
