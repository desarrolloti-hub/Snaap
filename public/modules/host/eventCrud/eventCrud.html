<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Eventos - SNAAP Host</title>
    <link rel="stylesheet" href="/src/css/components/eventCrud.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- El navbar se carga automáticamente aquí -->
        <div class="crud-page">
            <div class="crud-container">
                <div class="crud-header">
                    <h1><i class="fas fa-calendar-alt"></i> Gestión de Eventos</h1>
                    <a href="/host/events" class="back-btn" data-link><i class="fas fa-arrow-left"></i> Volver al Carrusel</a>
                </div>

                <div class="crud-content">
                    <!-- Formulario para crear/editar -->
                    <div class="form-section">
                        <h2><i class="fas fa-edit"></i> Formulario de Evento</h2>
                        <form id="eventoForm">
                            <input type="hidden" id="eventoId">
                            <div class="form-group">
                                <label for="title"><i class="fas fa-tag"></i> Nombre del Evento:</label>
                                <input type="text" id="title" required>
                            </div>
                            <div class="form-group">
                                <label for="img"><i class="fas fa-image"></i> URL de la Imagen:</label>
                                <input type="url" id="img" required>
                            </div>
                            <div class="form-group">
                                <label for="date"><i class="fas fa-calendar-day"></i> Fecha:</label>
                                <input type="text" id="date" required placeholder="Ej: 15 Marzo 2024">
                            </div>
                            <div class="form-group">
                                <label for="attendees"><i class="fas fa-users"></i> Asistentes:</label>
                                <input type="number" id="attendees" required min="0">
                            </div>
                            <div class="form-group">
                                <label for="uploadedPhotos"><i class="fas fa-camera"></i> Fotos Subidas:</label>
                                <input type="number" id="uploadedPhotos" required min="0">
                            </div>
                            <div class="form-buttons">
                                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Guardar</button>
                                <button type="button" id="cancelarBtn" class="btn-cancel"><i class="fas fa-undo"></i> Cancelar</button>
                            </div>
                        </form>
                    </div>

                    <!-- Lista de eventos -->
                    <div class="list-section">
                        <h2><i class="fas fa-list"></i> Lista de Eventos</h2>
                        <div class="search-bar">
                            <input type="text" id="searchInput" placeholder="Buscar evento...">
                            <i class="fas fa-search"></i>
                        </div>
                        <div id="eventosList" class="eventos-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/modules/host/eventCrud/eventCrudController.js"></script>
</body>
</html>
