<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/src/css/components/eventDetails.css">
</head>
<body>
<div class="event-details-container">
    <div class="details-header">
        <button id="btnVolver" class="btn-back">
            <i class="fas fa-arrow-left"></i> Volver
        </button>
        <h1><i class="fas fa-calendar-alt"></i> Detalles del Evento</h1>
    </div>

    <div class="details-card">
        <div class="event-image">
            <img id="eventImage" src="" alt="Imagen del evento">
        </div>

        <div class="event-info">
            <div class="info-group">
                <label><i class="fas fa-tag"></i> Título</label>
                <p id="eventTitle">-</p>
            </div>

            <div class="info-row">
                <div class="info-group">
                    <label><i class="fas fa-calendar-day"></i> Fecha</label>
                    <p id="eventDate">-</p>
                </div>
                <div class="info-group">
                    <label><i class="fas fa-clock"></i> Hora</label>
                    <p id="eventTime">-</p>
                </div>
            </div>

            <div class="info-group">
                <label><i class="fas fa-map-marker-alt"></i> Ubicación</label>
                <p id="eventLocation">-</p>
            </div>

            <div class="info-row">
                <div class="info-group">
                    <label><i class="fas fa-users"></i> Asistentes</label>
                    <p id="eventAttendees">-</p>
                </div>
                <div class="info-group">
                    <label><i class="fas fa-images"></i> Fotos subidas</label>
                    <p id="eventPhotos">-</p>
                </div>
            </div>

            <div class="info-group">
                <label><i class="fas fa-info-circle"></i> Descripción</label>
                <p id="eventDescription">-</p>
            </div>

            <div class="info-group">
                <label><i class="fas fa-box"></i> Paquete</label>
                <p id="eventPackage">-</p>
            </div>

            <div class="details-actions">
                <button id="btnEditar" class="btn-edit">
                    <i class="fas fa-edit"></i> Editar Evento
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
