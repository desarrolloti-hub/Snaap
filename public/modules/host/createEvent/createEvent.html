<!-- src/modules/host/createEvent/createEvent.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Evento - SNAAP Host</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/src/css/components/createEvent.css">
</head>
<body>
    <div class="snaap-create-event-section">
        <div class="create-event-card">
            <div class="create-event-header">
                <i class="fas fa-calendar-plus"></i>
                <h2>Crear Nuevo Evento</h2>
                <p class="subtitle">Completa los datos para crear tu evento personalizado</p>
            </div>

            <form id="createEventForm" class="create-event-form">
                <div class="form-group">
                    <label for="eventName">
                        <i class="fas fa-tag"></i>
                        Ingresa el nombre del Evento
                    </label>
                    <input type="text" 
                           id="eventName" 
                           name="eventName" 
                           class="snaap-input"
                           placeholder="Ej: Fiesta de cumpleaños de Juan"
                           required>
                    <small class="form-hint">Mínimo 3 caracteres</small>
                </div>

                <div class="form-group">
                    <label for="eventDescription">
                        <i class="fas fa-align-left"></i>
                        Descripción del Evento (Opcional)
                    </label>
                    <textarea 
                        id="eventDescription" 
                        name="eventDescription" 
                        class="snaap-input"
                        rows="3"
                        placeholder="Describe brevemente tu evento..."
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="eventLocation">
                        <i class="fas fa-map-marker-alt"></i>
                        Ubicación (Opcional)
                    </label>
                    <input type="text" 
                           id="eventLocation" 
                           name="eventLocation" 
                           class="snaap-input"
                           placeholder="Dirección o lugar del evento">
                </div>

                <div class="form-group">
                    <label for="packageSelect">
                        <i class="fas fa-box"></i>
                        Seleccione su Paquete
                    </label>
                    <select id="packageSelect" name="packageSelect" class="snaap-input" required>
                        <option value="">-- Selecciona un paquete --</option>
                        <option value="basico">⭐ Básico - ideal para 50 asistentes</option>
                        <option value="estandar">⚡ Estándar - ideal para 100 asistentes</option>
                        <option value="premium">💎 Premium - ideal para 150 asistentes</option>
                        <option value="empresarial">🏢 Empresarial - ideal para 200 asistentes</option>
                    </select>
                </div>

                <div id="packageDetails" class="package-details hidden">
                    <div class="details-header">
                        <i class="fas fa-info-circle"></i>
                        <h3>Detalles del Paquete</h3>
                    </div>
                    <div id="packageInfo" class="package-info"></div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn">
                        <i class="fas fa-times"></i>
                        Cancelar
                    </button>
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-check-circle"></i>
                        Crear Evento
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de confirmación personalizado -->
    <div id="customModal" class="custom-modal">
        <div class="custom-modal-content">
            <div class="custom-modal-header">
                <h3 id="modalIcon"><i class="fas fa-info-circle"></i> <span id="modalTitle">Aviso</span></h3>
                <span class="custom-modal-close" id="modalCloseBtn">&times;</span>
            </div>
            <div class="custom-modal-body">
                <p id="modalMessage">Mensaje de aviso</p>
            </div>
            <div class="custom-modal-footer" id="modalFooter">
                <button id="modalConfirmBtn" class="custom-btn-confirm">Aceptar</button>
                <button id="modalCancelBtn" class="custom-btn-cancel" style="display: none;">Cancelar</button>
            </div>
        </div>
    </div>

    <style>
        /* Estilos adicionales para el modal */
        .custom-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        .custom-modal-content {
            background-color: #fff;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s;
        }

        .custom-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .custom-modal-header h3 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        .custom-modal-close {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .custom-modal-close:hover {
            color: #333;
        }

        .custom-modal-body {
            padding: 24px;
            color: #555;
            line-height: 1.6;
        }

        .custom-modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .custom-btn-confirm {
            padding: 10px 24px;
            background: linear-gradient(135deg, #00d4ff, #007bff);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .custom-btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.4);
        }

        .custom-btn-cancel {
            padding: 10px 24px;
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .custom-btn-cancel:hover {
            background: #eee;
        }

        .form-hint {
            display: block;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>

    <script type="module">
        import { initCreateEvent } from './createEventController.js';
        initCreateEvent();
    </script>
</body>
</html>
