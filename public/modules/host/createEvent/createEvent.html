<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Evento - SNAAP Host</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/src/css/components/createEvent.css">
</head>
<body>
    <div class="snaap-create-event-section">
        <div class="create-event-card">
            <div class="create-event-header">
                <i class="fas fa-calendar-plus"></i>
                <h2>Crear Nuevo Evento</h2>
            </div>

            <form id="createEventForm" class="create-event-form">
                <div class="form-group">
                    <label for="eventName">
                        <i class="fas fa-tag"></i>
                        Ingresa el nombre del Evento
                    </label>
                    <input type="text" 
                           id="eventName" 
                           name="eventName" 
                           class="snaap-input"
                           required>
                </div>

                <div class="form-group">
                    <label for="packageSelect">
                        <i class="fas fa-box"></i>
                        Seleccione su Paquete
                    </label>
                    <select id="packageSelect" name="packageSelect" class="snaap-input" required>
                        <option value=""></option>
                        <option value="basico"><i class="fas fa-star"></i> Básico - ideal para 50 asistentes</option>
                        <option value="estandar"><i class="fas fa-bolt"></i> Estándar - ideal para 100 asistentes</option>
                        <option value="premium"><i class="fas fa-gem"></i> Premium - ideal para 150 asistentes</option>
                        <option value="empresarial"><i class="fas fa-building"></i> Empresarial - ideal para 200 asistentes</option>
                    </select>
                </div>

                <div id="packageDetails" class="package-details hidden">
                    <div class="details-header">
                        <i class="fas fa-info-circle"></i>
                        <h3>Detalles del Paquete</h3>
                    </div>
                    <div id="packageInfo" class="package-info"></div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn">
                        <i class="fas fa-times"></i>
                        Cancelar
                    </button>
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-check-circle"></i>
                        Crear Evento
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initCreateEvent } from '/src/modules/host/createEvent/createEventController.js';
        initCreateEvent();
    </script>
</body>
</html>
