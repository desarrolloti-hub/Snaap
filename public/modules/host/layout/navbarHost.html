<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Host - SNAAP</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="snaap-navbar">
        <a href="/" class="snaap-logo" data-link>

        <ul class="snaap-menu" id="snaap-nav-list">
            <li><a href="/nosotros" class="snaap-btn" data-link><i class="fas fa-info-circle"></i> Crear nuevo evento</a></li>
            <li><a href="/paquetes" class="snaap-btn" data-link><i class="fas fa-boxes"></i> Historial de eventos</a></li>

            <li><a href="/login" class="snaap-btn" data-link><i class="fas fa-info-circle"></i>Cerrar sesión</a></li>
            <li class="snaap-footer-item">
                <a href="https://rsienterprise.com/" target="_blank" class="snaap-footer-link">
                    desarrollada por rsi enterprise mexico
                </a>
            </li>
        </ul>
    </nav>
    
    <div class="demo-content">
        <h1>Panel de Host</h1>
        <p>Reduce el ancho de la ventana para ver el menú responsivo</p>
        <p style="margin-top: 20px; font-size: 0.9rem;">✨ Botones con efecto neón y hover rosa</p>
    </div>
