<!-- public/modules/user/homeUser/homeUser.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento - Snaap</title>
    <link rel="stylesheet" href="/src/css/main.css">
    <link rel="stylesheet" href="/src/css/components/homeUser.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Navbar se inyecta aquí (pero se oculta con CSS/JS) -->
        <nav id="navbar"></nav>

        <main class="user-home-container" id="userHomeContainer">
            <!-- ========================================== -->
            <!-- HEADER -->
            <!-- ========================================== -->
            <section class="user-home-header">
                <h1><i class="fas fa-calendar-alt"></i> Cargando evento...</h1>
                <p><i class="fas fa-camera"></i> Captura momentos, comparte dibujos y guarda recuerdos</p>
                <div class="event-info">
                    <span class="event-badge"><i class="fas fa-ticket-alt"></i> Cargando...</span>
                </div>
            </section>

            <!-- ========================================== -->
            <!-- BOTONES DE ACCIÓN -->
            <!-- ========================================== -->
            <section class="user-home-actions">
                <!-- Botón 1: Tomar Foto -->
                <div class="action-card" id="takePhotoBtn">
                    <div class="action-icon"><i class="fas fa-camera"></i></div>
                    <h3>Tomar Foto</h3>
                    <p>Captura una foto desde tu cámara</p>
                    <button class="btn-action"><i class="fas fa-camera"></i> Abrir cámara</button>
                </div>

                <!-- Botón 2: Subir Dibujo -->
                <div class="action-card" id="uploadDrawingBtn">
                    <div class="action-icon"><i class="fas fa-paint-brush"></i></div>
                    <h3>Subir Dibujo</h3>
                    <p>Sube un dibujo desde tu dispositivo</p>
                    <button class="btn-action"><i class="fas fa-upload"></i> Seleccionar archivo</button>
                    <input type="file" id="drawingInput" accept="image/*" style="display:none">
                </div>

                <!-- Botón 3: Ver Mis Fotos -->
                <div class="action-card" id="viewPhotosBtn">
                    <div class="action-icon"><i class="fas fa-images"></i></div>
                    <h3>Mis Fotos</h3>
                    <p>Ver todas tus fotos y dibujos guardados</p>
                    <button class="btn-action"><i class="fas fa-eye"></i> Ver galería</button>
                </div>
            </section>

            <!-- ========================================== -->
            <!-- GALERÍA DE FOTOS -->
            <!-- ========================================== -->
            <section class="user-home-gallery" id="gallerySection" style="display:none;">
                <h2><i class="fas fa-images"></i> Mi Galería</h2>
                <div class="gallery-grid" id="galleryGrid">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p><i class="fas fa-spinner fa-spin"></i> Cargando imágenes...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- MODAL PARA VER IMAGEN -->
    <!-- ========================================== -->
    <div class="modal-overlay" id="imageModal" style="display:none;">
        <div class="modal-content">
            <button class="modal-close" id="modalCloseBtn"><i class="fas fa-times"></i></button>
            <img id="modalImage" src="" alt="Imagen">
            <div class="modal-info">
                <p id="modalDate"><i class="fas fa-calendar-day"></i> Fecha</p>
                <button class="btn-danger-small" id="modalDeleteBtn"><i class="fas fa-trash-alt"></i> Eliminar</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/modules/user/homeUser/homeUserController.js"></script>
</body>
</html>
