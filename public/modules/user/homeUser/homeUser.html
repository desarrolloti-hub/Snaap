<!-- public/modules/user/homeUser/homeUser.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento - Snaap</title>
    <link rel="stylesheet" href="/src/css/main.css">
    <link rel="stylesheet" href="/src/css/components/homeUser.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <nav id="navbar"></nav>

        <main class="user-home-container" id="userHomeContainer">
            <!-- ========================================== -->
            <!-- HEADER -->
            <!-- ========================================== -->
            <section class="user-home-header">
                <h1><i class="fas fa-calendar-alt"></i> Cargando evento...</h1>
                <p><i class="fas fa-camera"></i> Captura momentos, comparte dibujos y guarda recuerdos</p>
                <div class="event-info">
                    <span class="event-badge"><i class="fas fa-ticket-alt"></i> Cargando...</span>
                </div>
            </section>

            <!-- ========================================== -->
            <!-- BOTONES DE ACCIÓN -->
            <!-- ========================================== -->
            <section class="user-home-actions">
                <!-- Botón 1: Tomar Foto -->
                <div class="action-card" id="takePhotoBtn">
                    <div class="action-icon"><i class="fas fa-camera"></i></div>
                    <h3>Tomar Foto</h3>
                    <p>Captura una foto desde tu cámara</p>
                    <button class="btn-action"><i class="fas fa-camera"></i> Abrir cámara</button>
                </div>

                <!-- Botón 2: Subir Dibujo -->
                <div class="action-card" id="uploadDrawingBtn">
                    <div class="action-icon"><i class="fas fa-paint-brush"></i></div>
                    <h3>Subir Dibujo</h3>
                    <p>Crea un dibujo y compártelo</p>
                    <button class="btn-action"><i class="fas fa-paint-brush"></i> Abrir dibujo</button>
                </div>

                <!-- Botón 3: Mis Fotos (Galería del dispositivo) -->
                <div class="action-card" id="viewPhotosBtn">
                    <div class="action-icon"><i class="fas fa-images"></i></div>
                    <h3>Mis Fotos</h3>
                    <p>Selecciona fotos de tu galería</p>
                    <button class="btn-action" id="openGalleryBtn">
                        <i class="fas fa-images"></i> Abrir galería
                    </button>
                    <input type="file" id="galleryFileInput" accept="image/*" multiple style="display:none">
                </div>
            </section>

            <!-- ========================================== -->
            <!-- 🔥 VISTA PREVIA DE FOTOS SUBIDAS -->
            <!-- ========================================== -->
            <section class="user-home-preview" id="previewSection">
                <div class="preview-header">
                    <h3><i class="fas fa-images"></i> Tus fotos</h3>
                    <span id="photoCount">0</span>
                </div>
                <div class="preview-grid" id="previewGrid">
                    <!-- Las imágenes se renderizan desde JavaScript -->
                    <div class="empty-preview">
                        <i class="fas fa-camera"></i>
                        <p>No has subido fotos aún</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- 🔥 MODAL DE DIBUJO -->
    <!-- ========================================== -->
    <div class="drawing-modal-overlay" id="drawingModal" style="display:none;">
        <div class="drawing-modal-content">
            <div class="drawing-modal-header">
                <h2><i class="fas fa-paint-brush"></i> Dibujar</h2>
                <button class="drawing-modal-close" id="drawingModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="drawing-toolbar">
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="pen" title="Lápiz">
                        <i class="fas fa-pencil-alt"></i>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Borrador">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <button class="tool-btn" data-tool="clear" title="Limpiar todo">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
                <div class="tool-group">
                    <label class="color-label">
                        <span>Color:</span>
                        <input type="color" id="drawingColor" value="#4db8ff">
                    </label>
                </div>
                <div class="tool-group">
                    <label class="size-label">
                        <span>Tamaño:</span>
                        <input type="range" id="drawingSize" min="2" max="30" value="5">
                        <span id="sizeValue">5</span>
                    </label>
                </div>
            </div>

            <div class="drawing-canvas-wrapper">
                <canvas id="drawingCanvas"></canvas>
            </div>

            <div class="drawing-actions">
                <button class="btn-snaap" id="saveDrawingBtn">
                    <i class="fas fa-save"></i> Guardar Dibujo
                </button>
                <button class="btn-snaap-secondary" id="cancelDrawingBtn">
                    <i class="fas fa-times"></i> Cancelar
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/modules/user/homeUser/homeUserController.js"></script>
</body>
</html>
