<!-- public/modules/visitor/register/register.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Snaap</title>
    <link rel="stylesheet" href="/src/css/register.css">
    <link rel="stylesheet" href="/src/css/components/sweetalert.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <section class="snaap-register-section">
            <div class="register-logo-side">
                <div class="big-snaap-logo">Sn<span class="neon-aa">aa</span>p</div>
            </div>
            <div class="register-card">
                <h2>Crear cuenta nueva.</h2>
                <form class="register-form" id="register-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" class="snaap-input" id="register-name" placeholder="Nombre completo" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="snaap-input" id="register-email" placeholder="Correo electrónico" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="snaap-input" id="register-password" placeholder="Contraseña" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" class="snaap-input" id="register-confirm-password" placeholder="Confirmar contraseña" required>
                    </div>

                    <div class="terms-group">
                        <label class="terms-checkbox">
                            <input type="checkbox" id="acceptTermsRegister"> 
                            <span>Acepto los <a href="#" id="termsLinkRegister">términos y condiciones</a></span>
                        </label>
                    </div>

                    <div class="register-actions">
                        <!-- ✅ Botón Registrarme -->
                        <button type="submit" class="btn-register">Registrarme</button>
                        <!-- ✅ Botón Volver al login -->
                        <button type="button" class="btn-register-outline" id="btn-back-login">Volver al login</button>
                    </div>

                    <!-- ✅ Google como ícono (no botón) -->
                    <div class="social-login">
                        <span class="social-label">O regístrate con</span>
                        <div class="social-icons">
                            <i class="fab fa-google social-icon" id="google-register" data-social="google"></i>
                            <i class="fab fa-facebook-f social-icon" data-social="facebook"></i>
                            <i class="fab fa-apple social-icon" data-social="apple"></i>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/src/modules/visitor/register/registerController.js"></script>
</body>
</html>
