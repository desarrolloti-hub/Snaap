<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Snaap</title>
    <link rel="stylesheet" href="/src/css/pages/404.css">
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <!-- Código 404 -->
            <div class="error-code">
                <h1>404</h1>
                <div class="code-decoration"></div>
            </div>
            
            <!-- Mensaje principal -->
            <h2 class="error-title">Sitio en mantenimiento</h2>
            
            <!-- Descripción -->
            <p class="error-description">
                Estamos mejorando la experiencia Snaap.<br>
                Vuelve pronto, habrá novedades increíbles.
            </p>
            
            <!-- Botón de inicio -->
            <button id="goHomeBtn" class="home-button">
                <span class="button-icon">🏠</span>
                Ir al inicio
            </button>
            
            <!-- Contador de redirección -->
            <div class="redirect-info">
                <p>Redirigiendo en <span id="countdown">4</span> segundos...</p>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
        
        <!-- Elementos decorativos -->
        <div class="decoration-circle circle-1"></div>
        <div class="decoration-circle circle-2"></div>
        <div class="decoration-circle circle-3"></div>
    </div>

    <script type="module" src="/src/modules/shared/errors/404Controller.js"></script>
</body>
</html>
