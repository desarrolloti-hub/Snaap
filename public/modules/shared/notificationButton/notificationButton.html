<div class="notification-toggle">
    <button id="notificationBtn" class="btn-notification">
        <i class="fas fa-bell"></i>
        <span id="notificationStatus">Activar notificaciones</span>
        <span id="notificationBadge" class="badge" style="display: none;">0</span>
    </button>
</div>

<style>
    .notification-toggle {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
    }

    .btn-notification {
        background: rgba(10, 10, 20, 0.9);
        backdrop-filter: blur(20px);
        border: 2px solid #4db8ff;
        border-radius: 50px;
        padding: 12px 24px;
        color: #ffffff;
        font-family: 'Poppins', sans-serif;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 0 20px rgba(77, 184, 255, 0.2);
    }

    .btn-notification:hover {
        border-color: #ff007a;
        transform: translateY(-2px);
        box-shadow: 0 0 30px rgba(255, 0, 122, 0.3);
    }

    .btn-notification i {
        font-size: 1.2rem;
        color: #4db8ff;
    }

    .btn-notification.active i {
        color: #00ff88;
    }

    .btn-notification .badge {
        background: #ff007a;
        color: white;
        border-radius: 50%;
        padding: 2px 8px;
        font-size: 0.7rem;
        font-weight: 700;
        min-width: 20px;
        text-align: center;
    }

    .btn-notification .status-text {
        font-size: 0.85rem;
    }

    @media (max-width: 768px) {
        .btn-notification {
            padding: 10px 16px;
            font-size: 0.8rem;
        }
        
        .btn-notification .status-text {
            display: none;
        }
    }
</style>
