<div class="host-edit-container">
    <div class="form-header">
        <button id="backBtn" class="btn-back">
            <i class="fas fa-arrow-left"></i> Volver
        </button>
        <h1><i class="fas fa-user-edit"></i> Editar Host</h1>
        <p>Modifica los datos del organizador de eventos</p>
    </div>

    <div class="form-card">
        <form id="hostForm">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre de usuario *</label>
                    <input type="text" id="hostUsername" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico *</label>
                    <input type="email" id="hostEmail" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" id="hostPhone" placeholder="+56 9 1234 5678">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-building"></i> Empresa/Organización</label>
                    <input type="text" id="hostCompany" placeholder="Nombre de la empresa">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-toggle-on"></i> Estado</label>
                    <select id="hostStatus">
                        <option value="active">Activo</option>
                        <option value="inactive">Inactivo</option>
                        <option value="suspended">Suspendido</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-key"></i> Nueva Contraseña</label>
                    <input type="password" id="hostPassword" placeholder="Dejar en blanco para no cambiar">
                    <small class="form-hint">Mínimo 6 caracteres si desea cambiarla</small>
                </div>
            </div>

            <div class="form-group full-width">
                <label><i class="fas fa-info-circle"></i> Biografía</label>
                <textarea id="hostBio" rows="3" placeholder="Breve descripción del host..."></textarea>
            </div>

            <div class="form-actions">
                <button type="button" id="cancelBtn" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" id="saveBtn" class="btn-save">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
