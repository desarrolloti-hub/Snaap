<!-- public/modules/sysadmin/homeSysadmin/homeSysadmin.html -->
<div class="sysadmin-container">
    <h1>Panel de Administración</h1>
    <p>Bienvenido al sistema de administración de SNAAP</p>
    
    <!-- Sección de usuarios recientes (cuentas nuevas) -->
    <div class="recent-section">
        <h2><i class="fas fa-user-plus"></i> Cuentas Nuevas</h2>
        <div class="activity-list" id="recentUsers">
            <p class="loading">Cargando usuarios...</p>
        </div>
    </div>

    <!-- Sección de distribución de usuarios (SOLO Hosts y Admins) -->
    <div class="roles-section">
        <h2><i class="fas fa-user-tag"></i> Distribución de Usuarios</h2>
        <div class="roles-grid">
            <div class="role-card admin">
                <i class="fas fa-shield-alt"></i>
                <h4>Administradores</h4>
                <p id="adminCount">0</p>
            </div>
            <div class="role-card host">
                <i class="fas fa-calendar-plus"></i>
                <h4>Hosts</h4>
                <p id="hostCount">0</p>
            </div>
        </div>
    </div>
</div>
