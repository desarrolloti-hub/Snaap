<div class="sysadmin-container">
    <h1>Panel de Administración</h1>
    <p>Bienvenido al sistema de administración de SNAAP Host</p>
    
 
    <!-- Sección de actividad reciente -->
    <div class="recent-section">
        <h2><i class="fas fa-clock"></i> Actividad Reciente</h2>
        <div class="activity-list" id="recentActivity">
            <p class="loading">Cargando actividad...</p>
        </div>
    </div>

    <!-- Sección de usuarios por rol -->
    <div class="roles-section">
        <h2><i class="fas fa-user-tag"></i> Distribución de Usuarios</h2>
        <div class="roles-grid">
            <div class="role-card sysadmin">
                <i class="fas fa-shield-alt"></i>
                <h4>SysAdmin</h4>
                <p id="sysadminCount">0</p>
            </div>
            <div class="role-card host">
                <i class="fas fa-calendar-plus"></i>
                <h4>Hosts</h4>
                <p id="hostCount">0</p>
            </div>
            <div class="role-card visitor">
                <i class="fas fa-eye"></i>
                <h4>Visitantes</h4>
                <p id="visitorCount">0</p>
            </div>
        </div>
    </div>
    <div class="events-section">
        <h2><i class="fas fa-calendar-week"></i> Próximos Eventos</h2>
        <div class="events-table-container">
            <table class="events-table">
                <thead>
                    <tr>
                        <th>Evento</th>
                        <th>Fecha</th>
                        <th>Ubicación</th>
                        <th>Asistentes</th>
                    </tr>
                </thead>
                <tbody id="recentEvents">
                    <tr><td colspan="4" class="loading">Cargando eventos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <button id="logoutBtn" class="btn-estilo">Cerrar Sesión</button>
</div>
