<div class="admin-form-container">
    <div class="form-header">
        <button id="backBtn" class="btn-back">
            <i class="fas fa-arrow-left"></i> Volver
        </button>
        <h1><i class="fas fa-user-shield"></i> Crear Nuevo Administrador</h1>
        <p>Complete los datos del usuario con permisos de administrador</p>
    </div>

    <div class="form-card">
        <form id="adminForm">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre de usuario *</label>
                    <input type="text" id="adminUsername" placeholder="Ej: admin_snaap" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico *</label>
                    <input type="email" id="adminEmail" placeholder="admin@ejemplo.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña *</label>
                    <input type="password" id="adminPassword" placeholder="Mínimo 6 caracteres" required>
                    <small class="form-hint">La contraseña debe tener al menos 6 caracteres</small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" id="adminPhone" placeholder="+56 9 1234 5678">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Departamento</label>
                    <input type="text" id="adminDepartment" placeholder="Ej: TI, Marketing, Operaciones">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-toggle-on"></i> Estado</label>
                    <select id="adminStatus">
                        <option value="active">Activo</option>
                        <option value="inactive">Inactivo</option>
                        <option value="suspended">Suspendido</option>
                    </select>
                </div>
            </div>

            <div class="form-group full-width">
                <label><i class="fas fa-info-circle"></i> Notas</label>
                <textarea id="adminNotes" rows="3" placeholder="Información adicional sobre el administrador..."></textarea>
            </div>

            <div class="form-actions">
                <button type="button" id="cancelBtn" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" id="saveBtn" class="btn-save">
                    <i class="fas fa-save"></i> Guardar Administrador
                </button>
            </div>
        </form>
    </div>
</div>
