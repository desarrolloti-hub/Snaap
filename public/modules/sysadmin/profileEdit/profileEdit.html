<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/src/css/components/profileEdit.css">
</head>
<body>
<div class="profile-edit-container">
    <div class="profile-header">
        <h1><i class="fas fa-pen"></i> Editar Perfil</h1>
        <p>Modifica tu información personal</p>
    </div>

    <div class="profile-card">
        <div class="profile-avatar">
            <i class="fas fa-user-circle"></i>
        </div>
        
        <form id="profileForm" class="profile-form">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre de usuario</label>
                    <input type="text" id="profileUsername" placeholder="Ingresa tu nombre de usuario">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="profileEmail" placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" id="profilePhone" placeholder="+56 9 1234 5678">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-building"></i> Departamento</label>
                    <input type="text" id="profileDepartment" placeholder="Ej: TI, Marketing, Operaciones">
                </div>
            </div>

            <div class="form-group full-width">
                <label><i class="fas fa-info-circle"></i> Notas</label>
                <textarea id="profileNotes" rows="3" placeholder="Información adicional..."></textarea>
            </div>

            <div class="form-actions">
                <button type="button" id="cancelBtn" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" id="saveBtn" class="btn-save">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
