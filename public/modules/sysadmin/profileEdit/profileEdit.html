<!-- public/modules/sysadmin/profileEdit/profileEdit.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - SNAAP Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/css/components/profileEdit.css">
    <link rel="stylesheet" href="/src/css/components/sweetalert.css">
</head>
<body>
    <div id="app">
        <div class="profile-edit-container">
            <div class="profile-header">
                <button type="button" class="btn-back" id="btnVolver">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                <h1><i class="fas fa-user-edit"></i> Editar Perfil</h1>
                <p>Modifica tu información personal</p>
            </div>

            <div class="profile-card">
                <form id="editProfileForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre de usuario *</label>
                            <input type="text" id="editUsername" placeholder="Tu nombre de usuario" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Correo electrónico *</label>
                            <input type="email" id="editEmail" placeholder="tu@email.com" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Teléfono</label>
                            <input type="tel" id="editPhone" placeholder="+52 555 123 4567">
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-building"></i> Departamento</label>
                            <input type="text" id="editDepartment" placeholder="Ej: Administración">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label><i class="fas fa-info-circle"></i> Notas / Biografía</label>
                        <textarea id="editNotes" rows="4" placeholder="Información adicional..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="cancelBtn" class="btn-cancel">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/src/modules/sysadmin/profileEdit/profileEditController.js"></script>
</body>
</html>
