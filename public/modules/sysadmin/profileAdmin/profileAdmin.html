<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/src/css/components/profileAdmin.css">
</head>
<body>
<div class="profile-admin-container">
    <div class="profile-header">
        <h1><i class="fas fa-user-cog"></i> Mi Perfil</h1>
    </div>

    <div class="profile-card">
        <div class="profile-avatar">
            <i class="fas fa-user-circle"></i>
        </div>
        
        <form id="profileForm" class="profile-form">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre de usuario</label>
                    <input type="text" id="profileUsername" readonly>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="profileEmail" readonly>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" id="profilePhone" readonly>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-building"></i> Departamento</label>
                    <input type="text" id="profileDepartment" readonly>
                </div>
            </div>

            <div class="form-group full-width">
                <label><i class="fas fa-info-circle"></i> Notas</label>
                <textarea id="profileNotes" rows="3" readonly></textarea>
            </div>

            <div class="form-actions">
                <button type="button" id="editBtn" class="btn-edit">
                    <i class="fas fa-pen"></i> Editar Perfil
                </button>
                <button type="button" id="cancelBtn" class="btn-cancel" style="display: none;">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" id="saveBtn" class="btn-save" style="display: none;">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
