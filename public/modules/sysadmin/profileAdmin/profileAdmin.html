<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/src/css/components/profileAdmin.css">
</head>
<body>
<div class="profile-admin-container">
    <div class="profile-header">
        <h1><i class="fas fa-user-cog"></i> Mi Perfil</h1>
        <p>Visualiza tu información personal</p>
    </div>

    <div class="profile-card">
        <div class="profile-avatar">
            <i class="fas fa-user-circle"></i>
        </div>
        
        <div class="profile-info">
            <div class="info-row">
                <div class="info-group">
                    <label><i class="fas fa-user"></i> Nombre de usuario</label>
                    <p id="profileUsername">-</p>
                </div>

                <div class="info-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <p id="profileEmail">-</p>
                </div>
            </div>

            <div class="info-row">
                <div class="info-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <p id="profilePhone">-</p>
                </div>

                <div class="info-group">
                    <label><i class="fas fa-building"></i> Departamento</label>
                    <p id="profileDepartment">-</p>
                </div>
            </div>

            <div class="info-row full-width">
                <div class="info-group">
                    <label><i class="fas fa-info-circle"></i> Notas</label>
                    <p id="profileNotes">-</p>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" id="editBtn" class="btn-edit">
                    <i class="fas fa-pen"></i> Editar Perfil
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
