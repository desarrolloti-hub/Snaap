<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/src/css/components/profileAdmin.css">
</head>
<body>
<div class="profile-admin-container">
    <div class="profile-header">
        <h1><i class="fas fa-user-cog"></i> Mi Perfil</h1>
        <p>Administra tu información personal</p>
    </div>

    <div class="profile-card">
        <div class="profile-avatar">
            <i class="fas fa-user-circle"></i>
        </div>
        
        <form id="profileForm" class="profile-form">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre de usuario</label>
                    <input type="text" id="profileUsername" readonly>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="profileEmail" readonly>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" id="profilePhone" placeholder="+56 9 1234 5678">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-building"></i> Departamento</label>
                    <input type="text" id="profileDepartment" placeholder="Ej: TI, Marketing, Operaciones">
                </div>
            </div>

            <div class="form-group full-width">
                <label><i class="fas fa-info-circle"></i> Notas</label>
                <textarea id="profileNotes" rows="3" placeholder="Información adicional..."></textarea>
            </div>

            <div class="form-divider">
                <span>Cambiar Contraseña</span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña actual</label>
                    <input type="password" id="profileCurrentPassword" placeholder="Ingresa tu contraseña actual">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-key"></i> Nueva contraseña</label>
                    <input type="password" id="profileNewPassword" placeholder="Mínimo 6 caracteres">
                </div>
            </div>

            <div class="form-group full-width">
                <label><i class="fas fa-check-circle"></i> Confirmar nueva contraseña</label>
                <input type="password" id="profileConfirmPassword" placeholder="Repite tu nueva contraseña">
            </div>

            <div class="form-actions">
                <button type="button" id="cancelBtn" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" id="saveBtn" class="btn-save">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
