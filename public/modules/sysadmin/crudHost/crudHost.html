<!-- public/modules/sysadmin/crudHost/crudHost.html -->
<div class="crud-host-container">
    <div class="crud-header">
        <h1><i class="fas fa-users-cog"></i> Gestión de Hosts</h1>
        <p>Administra los organizadores de eventos de la plataforma</p>
    </div>

    <div class="crud-actions">
        <button id="createHostBtn" class="btn-create">
            <i class="fas fa-user-plus"></i> Nuevo Host
        </button>
        
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchHost" placeholder="Buscar host por nombre o email...">
        </div>
    </div>

    <div class="table-container">
        <table class="hosts-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Eventos</th>
                    <th>Asistentes</th>
                    <th>Estado</th>
                    <th>Fecha Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="hostsTableBody">
                <tr><td colspan="8" class="loading-text">Cargando hosts......</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal de confirmación para Habilitar/Inhabilitar -->
<div id="toggleModal" class="custom-modal">
    <div class="custom-modal-content">
        <div class="custom-modal-header">
            <h3><i class="fas fa-exchange-alt"></i> Confirmar Cambio de Estado</h3>
            <span class="custom-modal-close" id="toggleModalClose">&times;</span>
        </div>
        <div class="custom-modal-body">
            <p id="toggleMessage">¿Estás seguro de cambiar el estado de este host?</p>
        </div>
        <div class="custom-modal-footer">
            <button id="toggleConfirmBtn" class="custom-btn-confirm toggle">Confirmar</button>
            <button id="toggleCancelBtn" class="custom-btn-cancel">Cancelar</button>
        </div>
    </div>
</div>
