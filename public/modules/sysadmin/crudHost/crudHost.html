<div class="crud-host-container">
    <div class="crud-header">
        <h1><i class="fas fa-users-cog"></i> Gestión de Hosts</h1>
        <p>Administra los organizadores de eventos de la plataforma</p>
    </div>

    <div class="crud-actions">
        <button id="createHostBtn" class="btn-create">
            <i class="fas fa-user-plus"></i> Nuevo Host
        </button>
        
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchHost" placeholder="Buscar host por nombre o email...">
        </div>
    </div>

    <div class="table-container">
        <table class="hosts-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Eventos</th>
                    <th>Asistentes</th>
                    <th>Estado</th>
                    <th>Fecha Registro</th>
                    <th>Acciones</th>
                </thead>
                <tbody id="hostsTableBody">
                    <tr><td colspan="8" class="loading-text">Cargando hosts......</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de confirmación para eliminar -->
<div id="deleteModal" class="custom-modal">
    <div class="custom-modal-content">
        <div class="custom-modal-header">
            <h3><i class="fas fa-exclamation-triangle"></i> Confirmar Eliminación</h3>
            <span class="custom-modal-close">&times;</span>
        </div>
        <div class="custom-modal-body">
            <p id="deleteMessage">¿Estás seguro de eliminar este host?</p>
        </div>
        <div class="custom-modal-footer">
            <button id="deleteConfirmBtn" class="custom-btn-confirm delete">Eliminar</button>
            <button id="deleteCancelBtn" class="custom-btn-cancel">Cancelar</button>
        </div>
    </div>
</div>
