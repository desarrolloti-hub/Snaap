<!-- public/modules/sysadmin/hostDetails/hostDetails.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Host - SNAAP Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/css/components/hostDetails.css">
    <link rel="stylesheet" href="/src/css/components/sweetalert.css">
</head>
<body>
    <div id="app">
        <div class="host-details-container">
            <!-- Header -->
            <div class="details-header">
                <button type="button" class="btn-back" id="btnVolver">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                <h1><i class="fas fa-user-circle"></i> Detalles del Host</h1>
            </div>

            <!-- Tarjeta de detalles -->
            <div class="details-card" id="hostDetailsCard">
                <div class="details-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando detalles...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/modules/sysadmin/hostDetails/hostDetailsController.js"></script>
</body>
</html>
